<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maritime OSINT — Login</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='dist/style.css') }}">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-box {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: var(--s-6) var(--s-5);
      width: 100%;
      max-width: 360px;

      & h1 { font-size: 1.1rem; margin-bottom: var(--s-1); color: var(--accent); }
      & p  { font-size: var(--fs-80); color: var(--muted); margin-bottom: var(--s-5); }
      
      & input[type="password"] {
        width: 100%; box-sizing: border-box;
        background: var(--bg); border: 1px solid var(--border);
        color: var(--text); padding: var(--fs-62) var(--s-3);
        border-radius: 4px; font-family: inherit; font-size: var(--fs-90);
        margin-bottom: var(--s-4);
        
        &:focus { outline: none; border-color: var(--accent); }
      }

      & button {
        width: 100%; padding: 0.65rem;
        background: var(--accent); color: var(--black);
        border: none; border-radius: 4px;
        font-family: inherit; font-size: var(--fs-90); font-weight: 600;
        cursor: pointer;
        
        &:hover { opacity: 0.9; }
      }

      & .error { color: var(--danger); font-size: var(--fs-80); margin-top: var(--s-3); }
    }
  </style>
</head>
<body>
  <div class="login-box">
    <h1>MARITIME OSINT</h1>
    <p>Sanctions &amp; Shadow Fleet Intelligence Platform</p>
    <form method="POST" action="/login">
      <input type="password" name="password" placeholder="Access password" autofocus>
      <button type="submit">Enter</button>
      {% if error %}<p class="error">{{ error }}</p>{% endif %}
    </form>
  </div>
</body>
</html>
