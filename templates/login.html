<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maritime OSINT — Login</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-box {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 360px;
    }
    .login-box h1 { font-size: 1.1rem; margin-bottom: 0.25rem; color: var(--accent); }
    .login-box p  { font-size: 0.8rem; color: var(--muted); margin-bottom: 1.5rem; }
    .login-box input[type="password"] {
      width: 100%; box-sizing: border-box;
      background: var(--bg); border: 1px solid var(--border);
      color: var(--text); padding: 0.6rem 0.75rem;
      border-radius: 4px; font-family: inherit; font-size: 0.9rem;
      margin-bottom: 1rem;
    }
    .login-box input[type="password"]:focus { outline: none; border-color: var(--accent); }
    .login-box button {
      width: 100%; padding: 0.65rem;
      background: var(--accent); color: #000;
      border: none; border-radius: 4px;
      font-family: inherit; font-size: 0.9rem; font-weight: 600;
      cursor: pointer;
    }
    .login-box button:hover { opacity: 0.9; }
    .error { color: var(--danger); font-size: 0.8rem; margin-top: 0.75rem; }
  </style>
</head>
<body>
  <div class="login-box">
    <h1>MARITIME OSINT</h1>
    <p>Sanctions &amp; Shadow Fleet Intelligence Platform</p>
    <form method="POST" action="/login">
      <input type="password" name="password" placeholder="Access password" autofocus>
      <button type="submit">Enter</button>
      {% if error %}<p class="error">{{ error }}</p>{% endif %}
    </form>
  </div>
</body>
</html>
